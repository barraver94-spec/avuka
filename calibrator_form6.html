const CFG=JSON.parse(document.getElementById('cfg').textContent);
let zoom=1.35,cur=0,sel=null;
const stage=document.getElementById('stage'),bg=document.getElementById('bg'),ov=document.getElementById('ov'),msg=document.getElementById('msg');
function selInfo(f){document.getElementById('sel').innerHTML='<b>'+(f.label||f.id)+'</b><br><code style="color:#fd9">'+f.id+'</code>';
 const c=document.getElementById('coord');document.getElementById('fontctl').style.display='block';document.getElementById('fval').textContent=f.fs;
 if(f.type==='digits')c.innerHTML='ספרות: '+(f.boxes_x.length-1)+' תאים<br>y: '+f.y0.toFixed(1)+'–'+f.y1.toFixed(1);
 else c.innerHTML='x: '+f.x0.toFixed(1)+' y: '+f.y0.toFixed(1)+'<br>w: '+(f.x1-f.x0).toFixed(1)+' h: '+(f.y1-f.y0).toFixed(1);}
function clearSel(){[...ov.querySelectorAll('.sel')].forEach(x=>x.classList.remove('sel'));}
function geom(el,x0,y0,x1,y1,fs,align){el.style.left=(x0*zoom)+'px';el.style.top=(y0*zoom)+'px';el.style.width=((x1-x0)*zoom)+'px';el.style.height=((y1-y0)*zoom)+'px';el.style.fontSize=(fs*zoom)+'px';el.style.lineHeight=((y1-y0)*zoom)+'px';if(align)el.style.textAlign=align;el.style.direction='rtl';}
function editable(el){el.addEventListener('dblclick',e=>{e.preventDefault();el.classList.add('edit');el.contentEditable=true;el.focus();});el.addEventListener('blur',()=>{el.classList.remove('edit');el.contentEditable=false;});}
function makeField(f){
  const el=document.createElement('div');el.className='fld'+(f.type==='checkbox'?' cb':'');el.textContent=f.demo||'';
  geom(el,f.x0,f.y0,f.x1,f.y1,f.fs,f.align||'center');
  const lb=document.createElement('div');lb.className='lbl';lb.textContent=f.label;el.appendChild(lb);
  const rs=document.createElement('div');rs.className='rs';el.appendChild(rs);
  let o;
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('rs')||el.classList.contains('edit'))return;e.preventDefault();clearSel();el.classList.add('sel');sel=f;selInfo(f);
    o=[f.x0,f.y0,f.x1,f.y1];const sx=e.clientX,sy=e.clientY;
    function mm(ev){const dx=(ev.clientX-sx)/zoom,dy=(ev.clientY-sy)/zoom;f.x0=o[0]+dx;f.y0=o[1]+dy;f.x1=o[2]+dx;f.y1=o[3]+dy;geom(el,f.x0,f.y0,f.x1,f.y1,f.fs,f.align);selInfo(f);}
    function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
  rs.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();clearSel();el.classList.add('sel');sel=f;selInfo(f);
    const sx=e.clientX,sy=e.clientY,a=[f.x0,f.y0,f.x1,f.y1];
    function mm(ev){f.x0=Math.min(a[0]+(ev.clientX-sx)/zoom,f.x1-3);f.y1=Math.max(a[3]+(ev.clientY-sy)/zoom,f.y0+3);geom(el,f.x0,f.y0,f.x1,f.y1,f.fs,f.align);selInfo(f);}
    function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
  editable(el); f._el=el; ov.appendChild(el);
}
function makeDigits(f){
  f._cells=[];
  for(let i=0;i<f.boxes_x.length-1;i++){
    const el=document.createElement('div');el.className='fld dig';el.textContent=(f.demo||'')[i]||'';
    geom(el,f.boxes_x[i],f.y0,f.boxes_x[i+1],f.y1,f.fs,'center');
    if(i===0){const lb=document.createElement('div');lb.className='lbl';lb.textContent=f.label;el.appendChild(lb);}
    let o;
    el.addEventListener('mousedown',e=>{if(el.classList.contains('edit'))return;e.preventDefault();clearSel();f._cells.forEach(c=>c.classList.add('sel'));sel=f;selInfo(f);
      o={bx:[...f.boxes_x],y0:f.y0,y1:f.y1};const sx=e.clientX,sy=e.clientY;
      function mm(ev){const dx=(ev.clientX-sx)/zoom,dy=(ev.clientY-sy)/zoom;f.boxes_x=o.bx.map(x=>x+dx);f.y0=o.y0+dy;f.y1=o.y1+dy;redrawDigits(f);selInfo(f);}
      function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
    editable(el); f._cells.push(el); ov.appendChild(el);
  }
}
function redrawDigits(f){f._cells.forEach((el,i)=>geom(el,f.boxes_x[i],f.y0,f.boxes_x[i+1],f.y1,f.fs,'center'));}
function renderTable(){const t=CFG.table;
  t.columns.forEach(col=>{
    const g=document.createElement('div');g.className='colg';g.style.left=(col.x0*zoom)+'px';g.style.top=((t.row_y[0]-9)*zoom)+'px';g.style.width=((col.x1-col.x0)*zoom)+'px';g.style.height=(7*zoom)+'px';g.title=col.label;
    let o;g.addEventListener('mousedown',e=>{e.preventDefault();o=[col.x0,col.x1];const sx=e.clientX;
      function mm(ev){const dx=(ev.clientX-sx)/zoom;col.x0=o[0]+dx;col.x1=o[1]+dx;render();}
      function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
    ov.appendChild(g);
    for(let i=0;i<t.row_y.length-1;i++){
      const c=document.createElement('div');c.className='tcell'+(i===0?' r0':'');c.textContent=i===0?(col.demo||''):'';
      geom(c,col.x0,t.row_y[i],col.x1,t.row_y[i+1],8,'center');
      if(i===0){let o2;c.addEventListener('mousedown',e=>{if(c.classList.contains('edit'))return;e.preventDefault();o2=[...t.row_y];const sy=e.clientY;
          function mm(ev){const dy=(ev.clientY-sy)/zoom;t.row_y=o2.map(y=>y+dy);render();}
          function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});}
      editable(c); ov.appendChild(c);
    }
  });}
function render(){const p=CFG.pages[cur];bg.src='data:image/png;base64,'+p.bg;bg.style.width=(p.w*zoom)+'px';bg.style.height=(p.h*zoom)+'px';stage.style.width=(p.w*zoom)+'px';stage.style.height=(p.h*zoom)+'px';ov.innerHTML='';
  CFG.fields.filter(f=>f.page===cur).forEach(f=>{if(f.type==='digits')makeDigits(f);else makeField(f);});
  if(CFG.table.page===cur)renderTable();document.getElementById('tablectl').style.display=(CFG.table.page===cur)?'block':'none';}
function buildTabs(){const c=document.getElementById('pagetabs');c.innerHTML='';CFG.pages.forEach((p,i)=>{const b=document.createElement('button');b.className='btn'+(i===0?' on':'');b.textContent='עמוד '+(i+1);b.onclick=()=>{cur=i;[...c.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};c.appendChild(b);});}
buildTabs();
document.getElementById('zoom').oninput=e=>{zoom=e.target.value/100;document.getElementById('zlab').textContent=e.target.value+'%';render();};
document.getElementById('fmin').onclick=()=>{if(sel){sel.fs=Math.max(5,Math.round((sel.fs-0.5)*2)/2);render();}};
document.getElementById('fplus').onclick=()=>{if(sel){sel.fs=Math.round((sel.fs+0.5)*2)/2;render();}};
document.getElementById('up').onclick=()=>{CFG.table.row_y=CFG.table.row_y.map(y=>y-1);render();};
document.getElementById('dn').onclick=()=>{CFG.table.row_y=CFG.table.row_y.map(y=>y+1);render();};
function r1(v){return Math.round(v*10)/10;}
document.getElementById('exp').onclick=()=>{const out={form:CFG.form,fields:CFG.fields.map(f=>f.type==='digits'
   ?{id:f.id,page:f.page,type:'digits',boxes_x:f.boxes_x.map(r1),y0:r1(f.y0),y1:r1(f.y1),fs:f.fs}
   :{id:f.id,page:f.page,type:f.type,x0:r1(f.x0),y0:r1(f.y0),x1:r1(f.x1),y1:r1(f.y1),fs:f.fs,align:f.align||'center'}),
   table:{page:CFG.table.page,row_y:CFG.table.row_y.map(r1),columns:CFG.table.columns.map(c=>({key:c.key,x0:r1(c.x0),x1:r1(c.x1)}))}};
  const b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='form'+CFG.form+'_calibrated.json';a.click();msg.textContent='יוצא ✓';};
render();
</script></body></html>
